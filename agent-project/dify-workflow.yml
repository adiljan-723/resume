app:
  description: "基于RAG+多工具调用的电子工程AI助教。集成5领域意图识别（电路/信号/单片机/通信/学习），4条专家Agent链，混合检索知识库，支持MATLAB/C代码生成，覆盖深大电子信息工程核心课程。"
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: advanced-chat
  name: 智能电子工程学习助手 Agent
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/deepseek:0.0.17@f7a5c1d222d17ee419b17a80d6e4923838fe93788dc724a3af73fbc6990b3a32
    version: null
kind: app
version: "0.6.0"
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions: [.JPG, .JPEG, .PNG, .GIF, .WEBP, .SVG]
      allowed_file_types: [image]
      allowed_file_upload_methods: [local_file, remote_url]
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: |
      👋 你好！我是电子工程学习助手，深圳大学电信学院AI助教。

      我可以帮你：
      ⚡ 电路分析 — 模拟/数字电路、放大器、滤波器
      📊 信号处理 — FFT、频谱分析、采样、MATLAB
      🔌 单片机开发 — STM32、C语言、传感器、中断
      📡 通信原理 — 调制解调、高频电路、5G
      📚 学习规划 — 课程规划、考研指导、论文写作

      抛出你的问题吧！👇
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: llm
      id: start-classifier
      source: start-node
      sourceHandle: source
      target: classifier-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: knowledge-retrieval
      id: classifier-knowledge
      source: classifier-node
      sourceHandle: source
      target: knowledge-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: knowledge-circuit
      source: knowledge-node
      sourceHandle: source
      target: circuit-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: knowledge-signal
      source: knowledge-node
      sourceHandle: source
      target: signal-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: knowledge-mcu
      source: knowledge-node
      sourceHandle: source
      target: mcu-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: knowledge-comm
      source: knowledge-node
      sourceHandle: source
      target: comm-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: knowledge-retrieval
        targetType: llm
      id: knowledge-general
      source: knowledge-node
      sourceHandle: source
      target: general-node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: llm
      id: circuit-answer
      source: circuit-node
      sourceHandle: source
      target: integrator
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: llm
      id: signal-answer
      source: signal-node
      sourceHandle: source
      target: integrator
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: llm
      id: mcu-answer
      source: mcu-node
      sourceHandle: source
      target: integrator
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: llm
      id: comm-answer
      source: comm-node
      sourceHandle: source
      target: integrator
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: llm
      id: general-answer
      source: general-node
      sourceHandle: source
      target: integrator
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: answer
      id: answer-end
      source: integrator
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: ""
        title: 用户输入
        type: start
        variables: []
      height: 72
      id: start-node
      position:
        x: 80
        y: 300
      positionAbsolute:
        x: 80
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
          - id: 76e0f9c8-105a-4b9b-9031-8fbb7a70d66e
            role: system
            text: "你是一个电子工程问题分类器。根据用户输入判断问题属于哪个类别。\n只输出类别编号，不要输出其他任何内容。\n\n类别列表：\n1 - 电路分析（模拟电路、数字电路、电路定理、放大器、滤波器）\n2 - 信号处理（信号与系统、FFT、频谱分析、采样定理、MATLAB）\n3 - 单片机开发（STM32、C语言、嵌入式、GPIO、中断、传感器）\n4 - 通信原理（调制解调、信道编码、高频电子线路）\n5 - 通用学习问题（学习方法、课程规划、论文写作）\n\n用户问题：{{#sys.query#}}\n\n输出（只输出数字1-5）："
        context:
          enabled: false
          variable_selector: []
        desc: ""
        memory:
          query_prompt_template: "{{#sys.query#}}"
          role_prefix:
            assistant: ""
            user: ""
          window:
            enabled: false
            size: 10
        vision:
          enabled: false
        variables: []
        title: 意图识别
        type: llm
      height: 90
      id: classifier-node
      position:
        x: 400
        y: 300
      positionAbsolute:
        x: 400
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        dataset_ids: []
        desc: ""
        multiple_retrieval_config:
          reranking_enable: true
          reranking_mode: reranking_model
          reranking_model:
            model: ""
            provider: ""
          top_k: 5
          score_threshold: 0.6
        query_variable_selector: ["sys", "query"]
        retrieval_mode: multiple
        title: 知识库检索
        type: knowledge-retrieval
      height: 90
      id: knowledge-node
      position:
        x: 720
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
